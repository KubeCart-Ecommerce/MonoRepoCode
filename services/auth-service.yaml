apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: dev
data:
  # Environment configs for the service
  NODE_ENV: "production"
  PORT: "4001"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: dev
type: Opaque
stringData:
  MONGO_URI: "mongodb://auth-mongo:27017/authdb"
  JWT_SECRET: "change_this_to_a_strong_secret_min_32_characters"
  JWT_REFRESH_SECRET: "change_this_to_another_strong_secret_min_32_characters"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  FRONTEND_URL: "http://frontend-service.dev.svc.cluster.local"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: dev
  labels:
    app: auth-service
spec:
  # Internal ClusterIP service for the application
  type: ClusterIP
  ports:
    - port: 4001
      targetPort: 4001
      protocol: TCP
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: dev
  labels:
    app: auth-service
spec:
  # Microservice replicas set to 2
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: aasiks/kubecart:authservice
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          # Readiness probe pointing to /health
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 5
          # Liveness probe pointing to /health
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 10
          # Resource constraints for stable scheduling
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
