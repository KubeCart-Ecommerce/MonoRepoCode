server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────
    # API REVERSE PROXY
    #
    # IMPORTANT: location blocks have NO trailing slash so they match
    # both  /api/auth         (no sub-path, e.g. query-only)
    # and   /api/auth/login   (with sub-path)
    #
    # proxy_pass has NO trailing slash so nginx forwards the FULL
    # original URI to the upstream (e.g. /api/auth/login stays as-is).
    #
    # proxy_set_header Origin "" — strips the browser Origin header before
    # forwarding to backend. Since all browser traffic is same-origin
    # (through nginx), backends don't need to perform CORS checks.
    # Our CORS callback already allows requests with no Origin header.
    # ─────────────────────────────────────────────────────────────

    location /api/auth {
        proxy_pass            http://auth-service:4001;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_set_header      Origin            "";
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /api/products {
        proxy_pass            http://product-service:4002;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_set_header      Origin            "";
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /api/orders {
        proxy_pass            http://order-service:4003;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_set_header      Origin            "";
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /api/cart {
        proxy_pass            http://cart-service:4004;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_set_header      Origin            "";
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /api/profiles {
        proxy_pass            http://user-profile-service:4005;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_set_header      Origin            "";
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /api/notifications {
        proxy_pass            http://notification-service:4006;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_set_header      Origin            "";
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ─────────────────────────────────────────────────────────────
    # SPA FALLBACK — must be last; React Router handles client routing
    # ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────────────────────
    # STATIC ASSET CACHING
    # ─────────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────────────────────
    # COMPRESSION
    # ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─────────────────────────────────────────────────────────────
    # SECURITY HEADERS
    # ─────────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}