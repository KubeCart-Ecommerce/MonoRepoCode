version: "3.9"

networks:
  kubecart-network:
    driver: bridge

volumes:
  mongo-data:

services:
  # ─────────────────────────────────────────────
  # Single MongoDB (Shared)
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0-jammy
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - kubecart-network
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend Services
  # ─────────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    restart: unless-stopped
    environment:
      PORT: "4001"
      NODE_ENV: "production"
      MONGO_URI: "mongodb://mongo:27017/auth_db"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      ALLOWED_ORIGINS: "${FRONTEND_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
    ports:
      - "4001:4001"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kubecart-network

  product-service:
    build: ./services/product-service
    container_name: product-service
    restart: unless-stopped
    environment:
      PORT: "4002"
      NODE_ENV: "production"
      MONGO_URI: "mongodb://mongo:27017/product_db"
      JWT_SECRET: "${JWT_SECRET}"
      ALLOWED_ORIGINS: "${FRONTEND_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
    ports:
      - "4002:4002"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kubecart-network

  order-service:
    build: ./services/order-service
    container_name: order-service
    restart: unless-stopped
    environment:
      PORT: "4003"
      NODE_ENV: "production"
      MONGO_URI: "mongodb://mongo:27017/order_db"
      JWT_SECRET: "${JWT_SECRET}"
      PRODUCT_SERVICE_URL: "http://product-service:4002"
      NOTIFICATION_SERVICE_URL: "http://notification-service:4006"
      ALLOWED_ORIGINS: "${FRONTEND_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
    ports:
      - "4003:4003"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kubecart-network

  cart-service:
    build: ./services/cart-service
    container_name: cart-service
    restart: unless-stopped
    environment:
      PORT: "4004"
      NODE_ENV: "production"
      MONGO_URI: "mongodb://mongo:27017/cart_db"
      JWT_SECRET: "${JWT_SECRET}"
      PRODUCT_SERVICE_URL: "http://product-service:4002"
      ALLOWED_ORIGINS: "${FRONTEND_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
    ports:
      - "4004:4004"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kubecart-network

  user-profile-service:
    build: ./services/user-profile-service
    container_name: user-profile-service
    restart: unless-stopped
    environment:
      PORT: "4005"
      NODE_ENV: "production"
      MONGO_URI: "mongodb://mongo:27017/profile_db"
      JWT_SECRET: "${JWT_SECRET}"
      ALLOWED_ORIGINS: "${FRONTEND_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
    ports:
      - "4005:4005"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kubecart-network

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    restart: unless-stopped
    environment:
      PORT: "4006"
      NODE_ENV: "production"
      MONGO_URI: "mongodb://mongo:27017/notification_db"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      ALLOWED_ORIGINS: "${FRONTEND_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
    ports:
      - "4006:4006"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kubecart-network

  # ─────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      cart-service:
        condition: service_started
      user-profile-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - kubecart-network