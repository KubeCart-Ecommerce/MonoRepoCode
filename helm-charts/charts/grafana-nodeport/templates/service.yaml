{{- $svc := index .Values.global "grafana-nodeport" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  namespace: {{ $svc.namespace }}
spec:
  type: {{ $svc.type }}
  selector:
{{- toYaml $svc.selector | nindent 4 }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.targetPort }}
      nodePort: {{ $svc.nodePort }}
