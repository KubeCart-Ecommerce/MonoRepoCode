{{- $svc := index .Values.global "cart-service" -}}
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: cart-service
spec:
  type: ClusterIP
  ports:
    - port: {{ $svc.servicePort }}
      targetPort: {{ $svc.containerPort }}
      protocol: TCP
  selector:
    app: cart-service
