{{- $gateway := .Values.global.gateway -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $gateway.routeName }}
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
    - name: {{ $gateway.name }}
  rules:
{{- range $route := $gateway.routes }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $route.path }}
      backendRefs:
        - name: {{ $route.serviceName }}
          port: {{ $route.servicePort }}
{{- end }}
