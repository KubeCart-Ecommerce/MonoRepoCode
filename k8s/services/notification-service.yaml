apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: dev
data:
  # Environment configs for the service
  NODE_ENV: "production"
  PORT: "4006"
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
  namespace: dev
type: Opaque
stringData:
  # Sensitive data: Database connection pointing to specific MongoDB
  MONGO_URI: "mongodb://notification-mongo:27017/notification_db"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_USER: "ahamedaasik512@gmail.com"
  SMTP_PASS: "kfmyrffrezkgwbiz"
  SMTP_FROM: "KubeCart <ahamedaasik512@gmail.com>"
  FRONTEND_URL: "http://frontend-service.dev.svc.cluster.local:3000"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: dev
  labels:
    app: notification-service
spec:
  # Internal ClusterIP service for the application
  type: ClusterIP
  ports:
    - port: 4006
      targetPort: 4006
      protocol: TCP
  selector:
    app: notification-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: dev
  labels:
    app: notification-service
spec:
  # Microservice replicas set to 2
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: aasiks/kubecart:notificationservice
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4006
          envFrom:
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: notification-service-secret
          # Readiness probe pointing to /health
          readinessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 10
            periodSeconds: 5
          # Liveness probe pointing to /health
          livenessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 15
            periodSeconds: 10
          # Resource constraints for stable scheduling
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
