apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: dev
data:
  REACT_APP_AUTH_SERVICE_URL: "http://auth-service.dev.svc.cluster.local:4001"
  REACT_APP_PRODUCT_SERVICE_URL: "http://product-service.dev.svc.cluster.local:4002"
  REACT_APP_ORDER_SERVICE_URL: "http://order-service.dev.svc.cluster.local:4003"
  REACT_APP_CART_SERVICE_URL: "http://cart-service.dev.svc.cluster.local:4004"
  REACT_APP_PROFILE_SERVICE_URL: "http://user-profile-service.dev.svc.cluster.local:4005"
  REACT_APP_NOTIFICATION_SERVICE_URL: "http://notification-service.dev.svc.cluster.local:4006"
  REACT_APP_APP_NAME: "KubeCart"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: dev
  labels:
    app: frontend
spec:
  # Internal ClusterIP service for the frontend
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dev
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: aasiks/kubecart:frontend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
